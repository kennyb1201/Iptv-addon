name: Refresh M3U

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call refresh endpoint (M3U only)
        run: |
          curl -sS -f -X GET \
            "https://${{ secrets.VERCEL_DOMAIN }}/api/cron/refresh?target=m3u&secret=${{ secrets.CRON_SECRET }}"
