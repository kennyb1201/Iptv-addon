name: Refresh EPG

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call refresh-epg endpoint
        run: |
          curl -sS -f -X GET \
            "https://${{ secrets.VERCEL_DOMAIN }}/api/cron/refresh-epg?secret=${{ secrets.CRON_SECRET }}"
